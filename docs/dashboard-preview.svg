<text x="860" y="296" fill="#1a2233" font-size="13.5">Revenue eased to $136,149 for the week</text>
<text x="860" y="318" fill="#1a2233" font-size="13.5">ending 2026-06-15, -6.5% against the prior</text>
<text x="860" y="340" fill="#1a2233" font-size="13.5">week. The team completed 129 jobs (-8.5%</text>
<text x="860" y="362" fill="#1a2233" font-size="13.5">week over week), at an average ticket of</text>
<text x="860" y="384" fill="#1a2233" font-size="13.5">$1,055. First-time-fix landed at 79.8%, an</text>
<text x="860" y="406" fill="#1a2233" font-size="13.5">improvement of 1.1 points. Furnace</text>
<text x="860" y="428" fill="#1a2233" font-size="13.5">Installation led revenue at $39,600, and</text>
<text x="860" y="450" fill="#1a2233" font-size="13.5">Elizabeth Johnson carried the most</text>
<text x="860" y="472" fill="#1a2233" font-size="13.5">completed jobs (11). The call center</text>
<text x="860" y="494" fill="#1a2233" font-size="13.5">booked 52.7% of calls. Momentum is steady;</text>
<text x="860" y="516" fill="#1a2233" font-size="13.5">keep senior technicians on the high-ticket</text>
<text x="860" y="538" fill="#1a2233" font-size="13.5">installation work where first-time-fix is</text>
<text x="860" y="560" fill="#1a2233" font-size="13.5">strongest.</text>
