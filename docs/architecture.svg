<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif">
  <rect width="1180" height="430" fill="#ffffff"/>
  <text x="30" y="40" fill="#1a2233" font-size="20" font-weight="700">OpsPulse architecture</text>
  <text x="30" y="62" fill="#5b6577" font-size="13">Data to backend to frontend to AI, runnable with one command.</text>

  <!-- defs -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#90a0b8"/>
    </marker>
  </defs>

  <!-- build-time group -->
  <rect x="22" y="96" width="338" height="150" rx="14" fill="#f7f9fc" stroke="#d9e0ea" stroke-dasharray="5 5"/>
  <text x="38" y="118" fill="#5b6577" font-size="12" font-weight="600">BUILD TIME (committed to the repo)</text>

  <!-- compose group -->
  <rect x="386" y="96" width="770" height="248" rx="14" fill="#f5faf7" stroke="#bfe0cf" stroke-dasharray="5 5"/>
  <text x="402" y="118" fill="#11875a" font-size="12" font-weight="600">docker compose up</text>

  <!-- Generator -->
  <rect x="40" y="138" width="146" height="86" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="113" y="174" fill="#1a2233" font-size="13.5" font-weight="600" text-anchor="middle">Data Generator</text>
  <text x="113" y="194" fill="#5b6577" font-size="11.5" text-anchor="middle">Python, seeded</text>
  <text x="113" y="210" fill="#5b6577" font-size="11.5" text-anchor="middle">18 months</text>

  <!-- CSVs -->
  <rect x="200" y="138" width="146" height="86" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="273" y="174" fill="#1a2233" font-size="13.5" font-weight="600" text-anchor="middle">Seed CSVs</text>
  <text x="273" y="194" fill="#5b6577" font-size="11.5" text-anchor="middle">jobs, invoices,</text>
  <text x="273" y="210" fill="#5b6577" font-size="11.5" text-anchor="middle">calls, reviews</text>

  <!-- ETL -->
  <rect x="404" y="138" width="146" height="86" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="477" y="170" fill="#1a2233" font-size="13.5" font-weight="600" text-anchor="middle">ETL Pipeline</text>
  <text x="477" y="190" fill="#5b6577" font-size="11.5" text-anchor="middle">Python</text>
  <text x="477" y="206" fill="#5b6577" font-size="11.5" text-anchor="middle">validate + load</text>

  <!-- Postgres -->
  <rect x="568" y="138" width="146" height="86" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="641" y="170" fill="#1a2233" font-size="13.5" font-weight="600" text-anchor="middle">PostgreSQL</text>
  <text x="641" y="190" fill="#5b6577" font-size="11.5" text-anchor="middle">star schema</text>
  <text x="641" y="206" fill="#5b6577" font-size="11.5" text-anchor="middle">4 dims, 4 facts</text>

  <!-- API -->
  <rect x="732" y="138" width="146" height="86" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="805" y="170" fill="#1a2233" font-size="13.5" font-weight="600" text-anchor="middle">REST API</text>
  <text x="805" y="190" fill="#5b6577" font-size="11.5" text-anchor="middle">Next.js routes</text>
  <text x="805" y="206" fill="#5b6577" font-size="11.5" text-anchor="middle">KPI queries</text>

  <!-- Dashboard -->
  <rect x="896" y="138" width="146" height="86" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="969" y="170" fill="#1a2233" font-size="13.5" font-weight="600" text-anchor="middle">Dashboard</text>
  <text x="969" y="190" fill="#5b6577" font-size="11.5" text-anchor="middle">Next.js + React</text>
  <text x="969" y="206" fill="#5b6577" font-size="11.5" text-anchor="middle">charts + tables</text>

  <!-- AI box -->
  <rect x="732" y="276" width="146" height="54" rx="10" fill="#eaf1ff" stroke="#bcd3ff"/>
  <text x="805" y="300" fill="#2f6df6" font-size="13" font-weight="600" text-anchor="middle">Claude API</text>
  <text x="805" y="318" fill="#3b6fd0" font-size="11" text-anchor="middle">AI insights (optional)</text>

  <!-- arrows -->
  <line x1="186" y1="181" x2="198" y2="181" stroke="#90a0b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="346" y1="181" x2="402" y2="181" stroke="#90a0b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="181" x2="566" y2="181" stroke="#90a0b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="714" y1="181" x2="730" y2="181" stroke="#90a0b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="878" y1="181" x2="894" y2="181" stroke="#90a0b8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="805" y1="224" x2="805" y2="274" stroke="#90a0b8" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="590" y="388" fill="#5b6577" font-size="12">The app reads the warehouse through its own REST API. The AI panel runs in demo mode with no key,</text>
  <text x="590" y="406" fill="#5b6577" font-size="12">and calls Claude live when ANTHROPIC_API_KEY is set.</text>
</svg>
